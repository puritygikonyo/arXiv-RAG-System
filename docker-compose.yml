
# =============================================================================
# arXiv RAG System — Docker Compose (Local Development)
# =============================================================================
# What runs here:    OpenSearch (single node) + OpenSearch Dashboards
# What runs in cloud: PostgreSQL (Neon), Redis (Upstash), Airflow (Astronomer)
# What runs locally:  FastAPI (uv run uvicorn ...) — NOT in Docker for dev speed
#
# This compose is intentionally lightweight to keep your laptop alive.
#
# Usage:
#   make start          → start all services
#   make stop           → stop all services
#   make health         → check all services
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # OpenSearch — single-node, no security plugin (local dev only)
  # Production equivalent: AWS OpenSearch Service or Elastic Cloud
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: arxiv_opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m   # keep RAM low on laptop
      - DISABLE_SECURITY_PLUGIN=true               # simpler for local dev
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"   # REST API
      - "9600:9600"   # performance analyzer
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200/_cluster/health | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - arxiv_net

  # ---------------------------------------------------------------------------
  # OpenSearch Dashboards — visual UI for inspecting indices + queries
  # Access at: http://localhost:5601
  # ---------------------------------------------------------------------------
  opensearch_dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: arxiv_dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - arxiv_net

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  opensearch_data:
    driver: local

networks:
  arxiv_net:
    driver: bridge
